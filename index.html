<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hồ sơ Phát triển Năng lực &amp; Định hướng Nghề nghiệp THPT — Hướng Nghiệp Alpha</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --navy:#142768;
  --navy-2:#1d3690;
  --amber:#F6B115;
  --amber-soft:#FFF4D8;
  --ink:#1b2333;
  --muted:#5b657a;
  --line:#e3e7f0;
  --bg:#f5f7fc;
  --card:#ffffff;
  --good:#1f9d6b;
  --warn:#d98b00;
  --shadow:0 1px 2px rgba(20,39,104,.06),0 8px 28px rgba(20,39,104,.08);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Be Vietnam Pro","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit}
a{color:var(--navy-2)}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;background:var(--navy);color:#fff;
  display:flex;align-items:center;gap:14px;padding:10px 18px;
  box-shadow:0 2px 14px rgba(20,39,104,.25);
}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{
  width:40px;height:40px;border-radius:10px;background:var(--amber);
  display:grid;place-items:center;color:var(--navy);font-weight:800;font-size:20px;
  flex:0 0 auto;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);
}
.brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
.brand p{font-size:11px;margin:0;color:#c8d2f2}
.topbar .spacer{flex:1}
.tbtn{
  background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.22);
  padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:.15s;
}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tbtn.amber{background:var(--amber);color:var(--navy);border-color:var(--amber)}
.tbtn.amber:hover{filter:brightness(1.05)}
.tbtn svg{width:15px;height:15px}

/* ---------- Layout ---------- */
.shell{display:flex;max-width:1280px;margin:0 auto;gap:0;align-items:flex-start}
.sidebar{
  width:288px;flex:0 0 288px;padding:18px 14px 60px;position:sticky;top:60px;
  height:calc(100vh - 60px);overflow-y:auto;
}
.main{flex:1;min-width:0;padding:22px 26px 90px}
.progress-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
.progress-wrap .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:7px}
.progress-track{height:8px;background:#e9edf6;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--navy),var(--navy-2));width:0;transition:width .4s}

.nav-part{margin-top:6px}
.nav-part>.part-h{
  display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.6px;
  text-transform:uppercase;color:var(--navy);padding:11px 8px 6px;
}
.nav-part>.part-h .pn{
  width:20px;height:20px;border-radius:6px;background:var(--amber-soft);color:var(--navy);
  display:grid;place-items:center;font-size:11px;flex:0 0 auto;
}
.nav-item{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:none;
  padding:8px 10px;border-radius:9px;font-size:13px;color:var(--ink);cursor:pointer;font-weight:500;
  transition:.12s;
}
.nav-item:hover{background:#eef1f9}
.nav-item.active{background:var(--navy);color:#fff;font-weight:600}
.nav-item.active .dot{background:var(--amber)}
.nav-item .dot{width:7px;height:7px;border-radius:99px;background:#c4ccdf;flex:0 0 auto}
.nav-item.done .dot{background:var(--good)}
.nav-item.active.done .dot{background:var(--amber)}

.opt-head{
  font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--amber);
  padding:14px 8px 4px;display:flex;align-items:center;gap:7px;
}

/* ---------- Content cards ---------- */
.page-head{margin-bottom:18px}
.eyebrow{font-size:11.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
.page-head h2{font-size:25px;margin:0 0 6px;color:var(--navy);font-weight:800;line-height:1.2}
.page-head .sub{color:var(--muted);font-size:14px;max-width:680px}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h3{font-size:15px;margin:0 0 4px;color:var(--navy);font-weight:700;display:flex;align-items:center;gap:8px}
.card .hint{font-size:12.5px;color:var(--muted);margin:0 0 14px}
.card h3 .tag{margin-left:auto;font-size:11px;font-weight:700;color:var(--navy);background:var(--amber-soft);padding:3px 9px;border-radius:99px}

.grid{display:grid;gap:14px}
.grid.c2{grid-template-columns:1fr 1fr}
.grid.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:720px){.grid.c2,.grid.c3{grid-template-columns:1fr}}

.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:5px}
.field .desc{font-size:11.5px;color:var(--muted);font-weight:400;margin-left:2px}
.field input,.field textarea,.field select{
  width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;
  font-family:inherit;color:var(--ink);background:#fff;transition:.12s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--navy-2);box-shadow:0 0 0 3px rgba(29,54,144,.12)
}
.field textarea{resize:vertical;min-height:74px;line-height:1.55}

/* ---------- Tables (repeaters) ---------- */
.rep table{width:100%;border-collapse:collapse;font-size:13px}
.rep th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--navy);
  font-weight:800;padding:8px 9px;border-bottom:2px solid var(--amber-soft);background:#fbfcfe;
}
.rep td{padding:6px 7px;border-bottom:1px solid var(--line);vertical-align:top}
.rep td input,.rep td textarea,.rep td select{
  width:100%;border:1px solid transparent;border-radius:7px;padding:7px 8px;font-size:13px;
  font-family:inherit;background:#f8fafd;
}
.rep td textarea{min-height:40px;resize:vertical;line-height:1.45}
.rep td input:focus,.rep td textarea:focus,.rep td select:focus{outline:none;border-color:var(--navy-2);background:#fff}
.rep td.del{width:34px;text-align:center}
.rowdel{background:none;border:none;color:#c0394b;cursor:pointer;font-size:17px;line-height:1;opacity:.55;padding:4px}
.rowdel:hover{opacity:1}
.addrow{
  margin-top:11px;background:var(--amber-soft);color:var(--navy);border:1px dashed var(--amber);
  padding:9px 14px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
}
.addrow:hover{background:#ffeec0}

/* ---------- Assessment (Holland / Gardner) ---------- */
.assess-q{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--line)}
.assess-q:last-child{border-bottom:none}
.assess-q .qt{flex:1;font-size:13.5px}
.scale{display:flex;gap:5px;flex:0 0 auto}
.scale button{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;
  font-size:13px;font-weight:700;color:var(--muted);transition:.12s;
}
.scale button:hover{border-color:var(--navy-2)}
.scale button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.scale-legend{font-size:11.5px;color:var(--muted);margin:2px 0 10px;display:flex;gap:18px;flex-wrap:wrap}
.result-card{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;border-radius:16px;padding:20px 22px;margin-bottom:16px}
.result-card h3{color:#fff;margin:0 0 12px}
.bars{display:flex;flex-direction:column;gap:9px}
.barline{display:flex;align-items:center;gap:11px}
.barline .nm{width:128px;flex:0 0 128px;font-size:12.5px;font-weight:600}
.barline .tr{flex:1;height:13px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden}
.barline .fl{height:100%;background:var(--amber);border-radius:99px;width:0;transition:width .6s}
.barline .vv{width:30px;text-align:right;font-size:12px;font-weight:700;color:var(--amber)}
.code-pill{display:inline-flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.code-pill span{background:var(--amber);color:var(--navy);font-weight:800;padding:6px 13px;border-radius:99px;font-size:14px;letter-spacing:1px}
.top-note{font-size:12.5px;color:#d3dcf6;margin-top:11px}

/* ---------- Dashboard ---------- */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:720px){.dash-grid{grid-template-columns:1fr}}
.dash-item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 17px}
.dash-item .dl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stars{font-size:22px;letter-spacing:3px;color:var(--amber);margin-top:7px}
.stars .e{color:#dfe4ef}
.dash-item .dnote{font-size:12px;color:var(--muted);margin-top:5px}

.callout{background:var(--amber-soft);border:1px solid #f3dca0;border-radius:13px;padding:14px 16px;font-size:13px;color:#6b5413;display:flex;gap:11px}
.callout b{color:var(--navy)}
.callout .ic{font-size:18px;flex:0 0 auto}

.cycle{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:6px}
@media(max-width:720px){.cycle{grid-template-columns:1fr 1fr}}
.cycle .c{background:#fff;border:1px solid var(--line);border-top:3px solid var(--amber);border-radius:12px;padding:13px}
.cycle .c .t{font-size:13px;font-weight:800;color:var(--navy)}
.cycle .c .d{font-size:12px;color:var(--muted);margin-top:5px}

.save-flag{font-size:12px;color:var(--muted);margin-left:6px}
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(20,39,104,.35);opacity:0;pointer-events:none;transition:.3s;z-index:90;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--good)}

.module-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:10px}
.ghost{background:#eef1f9;color:var(--navy);border:none;padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer}
.ghost:hover{background:#e3e8f6}
.primary{background:var(--navy);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
.primary:hover{background:var(--navy-2)}

.hide{display:none!important}

/* ---------- PDF render area ---------- */
#pdfArea{position:fixed;left:-9999px;top:0}
.pdf-page{
  width:794px;min-height:1123px;background:#fff;position:relative;padding:0;
  font-family:"Be Vietnam Pro","Segoe UI",system-ui,Arial,sans-serif;color:#1b2333;
}
.pdf-page .ph{background:#142768;color:#fff;padding:18px 42px;display:flex;align-items:center;gap:13px}
.pdf-page .ph .lg{width:38px;height:38px;border-radius:9px;background:#F6B115;color:#142768;display:grid;place-items:center;font-weight:800;font-size:19px}
.pdf-page .ph .ht{font-size:15px;font-weight:700}
.pdf-page .ph .hs{font-size:11px;color:#c8d2f2}
.pdf-body{padding:26px 42px 90px}
.pdf-page .pf{position:absolute;left:0;right:0;bottom:0;background:#142768;color:#fff;font-size:10.5px;text-align:center;padding:9px 20px;line-height:1.5}
.pdf-page .pf b{color:#F6B115}
.pdf-title{font-size:20px;font-weight:800;color:#142768;line-height:1.25;margin:0 0 4px}
.pdf-sub{font-size:12px;color:#5b657a;margin:0 0 18px}
.pdf-sec{font-size:13px;font-weight:800;color:#142768;text-transform:uppercase;letter-spacing:.5px;border-left:4px solid #F6B115;padding:4px 0 4px 11px;margin:20px 0 11px;background:#FFF4D8}
.pdf-sub-h{font-size:13px;font-weight:700;color:#1d3690;margin:15px 0 7px}
.pdf-kv{display:grid;grid-template-columns:160px 1fr;gap:4px 14px;font-size:12.5px;margin-bottom:5px}
.pdf-kv .k{color:#5b657a;font-weight:600}
.pdf-kv .v{color:#1b2333;white-space:pre-wrap}
.pdf-text{font-size:12.5px;white-space:pre-wrap;margin:0 0 9px;line-height:1.55}
.pdf-tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin:6px 0 12px}
.pdf-tbl th{background:#142768;color:#fff;text-align:left;padding:7px 8px;font-weight:600}
.pdf-tbl td{border:1px solid #dfe4ef;padding:6px 8px;vertical-align:top;white-space:pre-wrap}
.pdf-tbl tr:nth-child(even) td{background:#f7f9fc}
.pdf-bar{display:flex;align-items:center;gap:9px;margin:4px 0}
.pdf-bar .n{width:150px;font-size:11.5px;font-weight:600}
.pdf-bar .t{flex:1;height:11px;background:#e9edf6;border-radius:99px;overflow:hidden}
.pdf-bar .f{height:100%;background:#142768;border-radius:99px}
.pdf-bar .vv{width:34px;text-align:right;font-size:11px;font-weight:700;color:#1d3690}
.pdf-cover{display:flex;flex-direction:column;justify-content:center;min-height:1123px;padding:0 60px;text-align:center}
.pdf-cover .cv-lg{width:74px;height:74px;border-radius:18px;background:#F6B115;color:#142768;display:grid;place-items:center;font-weight:800;font-size:38px;margin:0 auto 26px}
.pdf-cover .cv-org{font-size:15px;font-weight:800;color:#142768;letter-spacing:1px;text-transform:uppercase}
.pdf-cover .cv-tl{font-size:32px;font-weight:800;color:#142768;line-height:1.2;margin:18px 0 12px}
.pdf-cover .cv-dv{width:70px;height:4px;background:#F6B115;border-radius:99px;margin:0 auto 16px}
.pdf-cover .cv-sub{font-size:13.5px;color:#5b657a;max-width:520px;margin:0 auto 30px;line-height:1.6}
.pdf-cover .cv-name{font-size:22px;font-weight:800;color:#1d3690}
.pdf-cover .cv-meta{font-size:13px;color:#5b657a;margin-top:6px}
.pdf-cover .cv-tag{margin-top:40px;font-size:13px;font-style:italic;color:#142768}
.pdf-cover .cv-stars{font-size:17px;letter-spacing:2px;color:#F6B115}
.pdf-cover .cv-stars .e{color:#dfe4ef}
.pdf-stars{font-size:17px;letter-spacing:2px;color:#F6B115}
.pdf-stars .e{color:#dfe4ef}

@media(max-width:880px){
  .sidebar{position:fixed;left:0;top:60px;z-index:35;background:var(--bg);box-shadow:6px 0 22px rgba(0,0,0,.12);transform:translateX(-104%);transition:.25s}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:inline-flex!important}
}
.menu-toggle{display:none}
</style>
</head>
<body>

<div class="topbar">
  <button class="tbtn menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
  <div class="brand">
    <div class="logo">A</div>
    <div>
      <h1>Hồ sơ Phát triển Năng lực &amp; Định hướng Nghề nghiệp</h1>
      <p>Hướng Nghiệp Alpha · Biến ước mơ thành sự nghiệp</p>
    </div>
  </div>
  <div class="spacer"></div>
  <button class="tbtn" id="btnSave" title="Đồng bộ dữ liệu lên Google Sheets">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
    Lưu
  </button>
  <button class="tbtn" id="btnExport" title="Tải file dữ liệu (.json)">Sau lưu nháp</button>
  <button class="tbtn" id="btnImport" title="Nạp file dữ liệu (.json)">Khôi phục nháp</button>
  <input type="file" id="fileImport" accept="application/json" class="hide">
  <button class="tbtn amber" id="btnPdf">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 18v-6M9 15h6"/></svg>
    Xuất PDF
  </button>
</div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="progress-wrap">
      <div class="lbl"><span>Tiến độ hoàn thiện hồ sơ</span><span id="progPct">0%</span></div>
      <div class="progress-track"><div class="progress-bar" id="progBar"></div></div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>

<div id="pdfArea"></div>
<div class="toast" id="toast"></div>

<script>

/* ============================================================
   ENGINE
   ============================================================ */
function $(s,r){return (r||document).querySelector(s);}
function ce(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nl2(s){return esc(s).replace(/\n/g,'<br>');}

var ALL_MODULES = [];
SECTIONS.forEach(function(s){s.modules.forEach(function(m){ALL_MODULES.push(m);});});
function moduleById(id){
  var all=ALL_MODULES.concat(OPTIONAL);
  for(var i=0;i<all.length;i++) if(all[i].id===id) return all[i];
  return null;
}
var current='m1';

/* ---------- State accessors ---------- */
function fv(mid,key){return (STATE.fields[mid]&&STATE.fields[mid][key])||'';}
function setF(mid,key,val){ if(!STATE.fields[mid])STATE.fields[mid]={}; STATE.fields[mid][key]=val; scheduleAuto(); }
function tableData(mid,key){ var id=mid+'.'+key; if(!STATE.tables[id])STATE.tables[id]=[]; return STATE.tables[id]; }
function setTable(mid,key,arr){ STATE.tables[mid+'.'+key]=arr; scheduleAuto(); }

/* ---------- Assessment compute ---------- */
function hollandScores(){
  var out={};HOLLAND_GROUPS.forEach(function(g){
    var arr=HOLLAND_ITEMS[g.key],sum=0;
    for(var i=0;i<arr.length;i++){var v=STATE.holland[g.key+'_'+i];sum+=(v?v:0);}
    out[g.key]={raw:sum,max:arr.length*4,pct:Math.round(sum/(arr.length*4)*100)};
  });return out;
}
function hollandTop(){
  var s=hollandScores();
  return HOLLAND_GROUPS.map(function(g){return {key:g.key,name:g.name,pct:s[g.key].pct,raw:s[g.key].raw};})
    .sort(function(a,b){return b.raw-a.raw;});
}
function gardnerScores(){
  var out={};GARDNER_TYPES.forEach(function(g){
    var arr=GARDNER_ITEMS[g.key],sum=0;
    for(var i=0;i<arr.length;i++){var v=STATE.gardner[g.key+'_'+i];sum+=(v?v:0);}
    out[g.key]={raw:sum,max:arr.length*4,pct:Math.round(sum/(arr.length*4)*100)};
  });return out;
}
function gardnerTop(){
  var s=gardnerScores();
  return GARDNER_TYPES.map(function(g){return {key:g.key,name:g.name,pct:s[g.key].pct,raw:s[g.key].raw};})
    .sort(function(a,b){return b.raw-a.raw;});
}

/* ---------- Completion / progress ---------- */
function moduleFilled(m){
  if(m.id==='m2'){
    var h=Object.keys(STATE.holland).length>0, g=Object.keys(STATE.gardner).length>0;
    return h||g||anyField(m);
  }
  if(m.id==='m15') return false;
  if(anyField(m)) return true;
  var has=false;
  m.cards.forEach(function(c){ if(c.table){ var d=tableData(m.id,c.table.k);
    d.forEach(function(r){ for(var k in r){ if(r[k]&&String(r[k]).trim()){has=true;} } }); } });
  return has;
}
function anyField(m){
  var f=STATE.fields[m.id]; if(!f) return false;
  for(var k in f){ if(f[k]&&String(f[k]).trim()) return true; } return false;
}
function progress(){
  var core=ALL_MODULES.filter(function(m){return m.id!=='m15';});
  var done=0; core.forEach(function(m){ if(moduleFilled(m)) done++; });
  return Math.round(done/core.length*100);
}
function updateProgress(){
  var p=progress();
  $('#progBar').style.width=p+'%';
  $('#progPct').textContent=p+'%';
}

function renderNav(){
  var nav=$('#nav'); nav.innerHTML='';
  SECTIONS.forEach(function(sec){
    var p=ce('div','nav-part');
    p.appendChild(ce('div','part-h','<span class="pn">'+sec.pn+'</span> Phần '+sec.pn+'. '+sec.part));
    sec.modules.forEach(function(m){
      var b=ce('button','nav-item'+(m.id===current?' active':'')+(moduleFilled(m)?' done':''));
      b.innerHTML='<span class="dot"></span>'+m.title;
      b.onclick=function(){go(m.id);};
      p.appendChild(b);
    });
    nav.appendChild(p);
  });
  var oh=ce('div','opt-head','＋ Module mở (kích hoạt khi cần)');
  nav.appendChild(oh);
  OPTIONAL.forEach(function(m){
    if(!STATE.opened[m.id]) return;
    var b=ce('button','nav-item'+(m.id===current?' active':'')+(moduleFilled(m)?' done':''));
    b.innerHTML='<span class="dot"></span>'+m.title;
    b.onclick=function(){go(m.id);};
    p.appendChild(b);
  });
  var add=ce('button','nav-item','<span class="dot" style="background:var(--amber)"></span><span style="color:var(--amber);font-weight:700">Quản lý module mở…</span>');
  add.onclick=function(){go('optmgr');};
  nav.appendChild(add);
  updateProgress();
}

/* ============================================================
   RENDER — FIELD & TABLE
   ============================================================ */
function fieldEl(mid,f){
  var wrap=ce('div','field');
  if(f.w==='full') wrap.style.gridColumn='1 / -1';
  var lab='<label>'+esc(f.l)+(f.d?' <span class="desc">— '+esc(f.d)+'</span>':'')+'</label>';
  var val=fv(mid,f.k);
  var el;
  if(f.t==='area'){ el='<textarea data-k="'+f.k+'" name="'+f.k+'" placeholder="'+esc(f.ph||'')+'">'+esc(val)+'</textarea>'; }
  else if(f.t==='select'){
    var o='<option value="">— Chọn —</option>';
    f.opts.forEach(function(op){o+='<option'+(op===val?' selected':'')+'>'+esc(op)+'</option>';});
    el='<select data-k="'+f.k+'" name="'+f.k+'">'+o+'</select>';
  } else {
    var type=f.t==='date'?'date':(f.t==='num'?'number':'text');
    el='<input type="'+type+'" data-k="'+f.k+'" name="'+f.k+'" value="'+esc(val)+'" placeholder="'+esc(f.ph||'')+'">';
  }
  wrap.innerHTML=lab+el;
  var input=wrap.querySelector('[data-k]');
  input.addEventListener('input',function(){ setF(mid,f.k,this.value); markNav(); });
  input.addEventListener('change',function(){ setF(mid,f.k,this.value); });
  return wrap;
}

function tableEl(mid,tb){
  var wrap=ce('div','rep');
  var tbl=ce('table');
  var thead=ce('thead'); var tr=ce('tr');
  tb.cols.forEach(function(c){ var th=ce('th',null,esc(c.l)); if(c.w)th.style.width=c.w; tr.appendChild(th); });
  if(!tb.fixed) tr.appendChild(ce('th','del',''));
  thead.appendChild(tr); tbl.appendChild(thead);
  var tbody=ce('tbody'); tbl.appendChild(tbody);
  wrap.appendChild(tbl);

  var data=tableData(mid,tb.k);
  if(data.length===0 && tb.defaultRows){
    tb.defaultRows.forEach(function(r){ var row={}; for(var k in r) row[k]=r[k]; data.push(row); });
    setTable(mid,tb.k,data);
  }
  if(data.length===0 && !tb.fixed){ data.push({}); setTable(mid,tb.k,data); }

  function drawBody(){
    tbody.innerHTML='';
    data.forEach(function(row,ri){
      var rtr=ce('tr');
      tb.cols.forEach(function(c){
        var td=ce('td'); var v=row[c.k]||'';
        if(c.fixed||(tb.fixed&&c.t==='text'&&c.k===tb.cols[0].k)){
          td.innerHTML='<div style="font-weight:600;color:var(--navy);font-size:13px;padding:7px 4px">'+esc(v)+'</div>';
        } else if(c.t==='area'){
          td.innerHTML='<textarea data-c="'+c.k+'" data-ri="'+ri+'">'+esc(v)+'</textarea>';
        } else if(c.t==='select'){
          var o='<option value="">—</option>'; c.opts.forEach(function(op){o+='<option'+(op===v?' selected':'')+'>'+esc(op)+'</option>';});
          td.innerHTML='<select data-c="'+c.k+'" data-ri="'+ri+'">'+o+'</select>';
        } else {
          td.innerHTML='<input type="text" data-c="'+c.k+'" data-ri="'+ri+'" value="'+esc(v)+'">';
        }
        var inp=td.querySelector('[data-c]');
        if(inp){ inp.addEventListener('input',function(){ row[this.getAttribute('data-c')]=this.value; scheduleAuto(); markNav(); });
                 inp.addEventListener('change',function(){ row[this.getAttribute('data-c')]=this.value; }); }
        rtr.appendChild(td);
      });
      if(!tb.fixed){
        var dtd=ce('td','del'); var db=ce('button','rowdel','×'); db.title='Xóa dòng';
        db.onclick=function(){ data.splice(ri,1); if(data.length===0)data.push({}); setTable(mid,tb.k,data); drawBody(); markNav(); };
        dtd.appendChild(db); rtr.appendChild(dtd);
      }
      tbody.appendChild(rtr);
    });
  }
  drawBody();
  if(!tb.fixed){
    var add=ce('button','addrow','＋ Thêm dòng');
    add.onclick=function(){ data.push({}); setTable(mid,tb.k,data); drawBody(); };
    wrap.appendChild(add);
  }
  return wrap;
}

function starStr(n){

}
function dashMetrics(){
  var nl=tableData('m3','nangluc'); var sum=0,cnt=0;
  nl.forEach(function(r){ if(r.muc){ sum+=parseInt(r.muc,10); cnt++; } });
  var mNL = cnt? (sum/cnt) : 0;
  var pc=tableData('m4','phamchat'); var pcd=0; pc.forEach(function(r){ if(r.mc&&r.mc.trim())pcd++; });
  var mPC = pcd/5*5;
  var ht=0; var f5=STATE.fields['m5']||{}; ['monmanh','moncaithien','kehoach_hoc'].forEach(function(k){if(f5[k]&&f5[k].trim())ht++;});
  var hk=tableData('m5','hocky').filter(function(r){return r.hk&&r.hk.trim();}).length;
  var mHT = Math.min(5, ht + Math.min(2,hk));
  var tn=0;

function cardEl(m,c){
  var card=ce('div','card');

  card.innerHTML=head+(c.hint?'<p class="hint">'+esc(c.hint)+'</p>':'');

// Hàm nộp ngầm dữ liệu lên Google Sheets thông qua Sheet Monkey API
function syncToGoogleSheets() {
  // Gom toàn bộ dữ liệu từ STATE (bao gồm cả các trường và bảng của tất cả module) thành một Object phẳng
  var flatData = {};
  
  // 1. Gom tất cả các trường input/textarea thông thường
  for (var mid in STATE.fields) {
    for (var key in STATE.fields[mid]) {
      flatData[mid + "_" + key] = STATE.fields[mid][key];
    }
  }
  
  // 2. Gom tất cả dữ liệu từ các bảng (Chuyển mảng thành dạng chuỗi text hoặc ô dữ liệu cụ thể để lưu trên hàng Excel)
  for (var tableId in STATE.tables) {
    var rows = STATE.tables[tableId];
    if (rows && rows.length > 0) {
      flatData[tableId] = JSON.stringify(rows); // Lưu cấu trúc bảng dưới dạng chuỗi JSON thô để phân tích nâng cao
    }
  }

  // 3. Gom kết quả trắc nghiệm Holland và Gardner
  var ht = hollandTop();
  if (ht.some(function(x){return x.raw > 0;})) {
    flatData["Holland_Code"] = ht.slice(0,3).map(function(t){return t.key;}).join('');
    flatData["Holland_Details"] = JSON.stringify(hollandScores());
  }
  var gt = gardnerTop();
  if (gt.some(function(x){return x.raw > 0;})) {
    flatData["Gardner_Top3"] = gt.slice(0,3).map(function(t){return t.name;}).join(', ');
    flatData["Gardner_Details"] = JSON.stringify(gardnerScores());
  }

  flatData["ThoiGianDongBo"] = new Date().toLocaleString('vi-VN');
  flatData["TienDoHoanThanh"] = progress() + "%";

  // Tiến hành fetch API chạy ngầm gửi lên hệ thống Sheet Monkey
  fetch(SHEET_MONKEY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(flatData),
    mode: 'cors'
  })
  .then(function(res) {
    if (res.ok) {
      console.log("Đã đồng bộ thành công dữ liệu lên hệ thống Google Sheets!");
    }
  })
  .catch(function(err) {
    console.error("Lỗi đồng bộ tự động lên Google Sheets:", err);
  });
}

function saveLocal(silent){
  try{ 
    localStorage.setItem(LSKEY,JSON.stringify(STATE)); 
    if(!silent) {
      toast('Đã lưu và đồng bộ thành công dữ liệu hồ sơ!', true);
    }
    // Kích hoạt đồng bộ dữ liệu ngầm lên Google Sheets mỗi khi dữ liệu thay đổi
    syncToGoogleSheets();
  }
  catch(e){ 
    if(!silent) toast('Trình duyệt đầy dung lượng — hãy dùng nút Sao lưu nháp'); 
  }
}

  try{ var s=localStorage.getItem(LSKEY); if(s){ var d=JSON.parse(s); mergeState(d); return true; } }catch(e){}

}

  var blob=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  var name=(fv('m1','hoten')||'hoso').trim().replace(/\s+/g,'_');
  var a=ce('a'); a.href=URL.createObjectURL(blob); a.download='HoSo_HNA_'+name+'.json'; a.click();

function importJSON(file){
  var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result); mergeState(d); saveLocal(true); go(current); toast('Đã khôi phục dữ liệu nháp',true); }

  r.readAsText(file);
}

function bTableBlocks(cols,rows,title){
  rows=rows.filter(function(r){ for(var k in r){ if(r[k]&&String(r[k]).trim())return true;} return false; });
  if(rows.length===0) return [];
  var CH=8, out=[];
  for(var i=0;i<rows.length;i+=CH){
    var chunk=rows.slice(i,i+CH);
    var th=cols.map(function(c){return '<th'+(c.w?' style="width:'+c.w+'"':'')+'>'+esc(c.l)+'</th>';}).join('');
    var body=chunk.map(function(r){
      return '<tr>'+cols.map(function(c){return '<td>'+nl2(r[c.k]||'')+'</td>';}).join('')+'</tr>';
    }).join('');
    out.push('<table class="pdf-tbl"><thead><tr>'+th+'</tr></thead><tbody>'+body+'</tbody></table>');
  }
  return out;
}

    push(bText('Cam kết với chính mình',fv('m12','camket')));

  /* PHẦN IV */
  push(bSection('Phần IV — Hành trình phát triển'));

  if(t14.length){ push(bSubH('14. Hồ sơ minh chứng')); t14.length && t14.forEach(push); }
  
  push(bSubH('15. Dashboard phát triển'));

  push('<table class="pdf-tbl"><thead><tr><th style="width:30%">Lĩnh vực</th><th style="width:30%">Mức độ</th><th>Ghi chú</th></tr></thead><tbody>'+
    dm.map(function(m){ var n=Math.max(0,Math.min(5,Math.round(m.val)));
      var st=''; for(var i=0;i<5;i++) st+=i<n?'★':'<span style="color:#dfe4ef">★</span>';
      return '<tr><td><b>'+esc(m.label)+'</b></td><td class="pdf-stars">'+st+'</td><td>'+esc(m.note)+'</td></tr>';

  var optBlocks=[];

        var h=bKV(kv); if(h) local.push(h); }
      else if(c.table){ var tb=bTableBlocks(c.table.cols.map(function(c){return {k:c.k,l:c.l};}),tableData(m.id,c.table.k)); tb.forEach(function(x){local.push(x);}); }
    });
    if(local.length){ optBlocks.push(bSubH('＋ '+m.title)); local.forEach(function(x){optBlocks.push(x);}); }
  });
  if(optBlocks.length){ push(bSection('Phần V — Module mở (theo định hướng riêng)')); optBlocks.forEach(push); }

  return B;

function paginate(blocks){
  var area=$('#pdfArea'); area.innerHTML='';
  var measure=ce('div'); measure.style.cssText='position:absolute;left:0;top:0;width:710px;visibility:hidden';
  area.appendChild(measure);
  var LIMIT=900;
  var pages=[]; var cur=[]; var curH=0;
  blocks.forEach(function(html){
    measure.innerHTML=html; var h=measure.offsetHeight+8;
    if(curH+h>LIMIT && cur.length>0){ pages.push(cur); cur=[]; curH=0; }
    cur.push(html); curH+=h;
  });
  if(cur.length) pages.push(cur);
  area.removeChild(measure);
  return pages;
}
function buildPDFPages(){
  var area=$('#pdfArea'); area.innerHTML='';
  var els=[];
  var cover=buildCover(); area.appendChild(cover); els.push(cover);
  var blocks=buildContentBlocks();
  var pages=paginate(blocks);
  pages.forEach(function(pg,i){
    var page=ce('div','pdf-page');
    page.innerHTML=pHeaderHTML()+'<div class="pdf-body">'+pg.join('')+'</div>'+pFooterHTML(i+1);
    area.appendChild(page); els.push(page);
  });
  return els;
}
async function exportPDF(){
  if(typeof window.jspdf==='undefined'||typeof html2canvas==='undefined'){ toast('Đang tải thư viện, thử lại sau giây lát…'); return; }
  toast('Đang tạo file PDF hồ sơ…');
  var els=buildPDFPages();
  await new Promise(function(r){setTimeout(r,120);});
  try{
    var jsPDF=window.jspdf.jsPDF;
    var pdf=new jsPDF('p','mm','a4');
    var pw=210, ph=297;
    for(var i=0;i<els.length;i++){
      var canvas=await html2canvas(els[i],{scale:2,useCORS:true,backgroundColor:'#ffffff',windowWidth:794});
      var img=canvas.toDataURL('image/jpeg',0.92);
      var iw=pw, ih=canvas.height*pw/canvas.width;
      if(i>0) pdf.addPage();
      if(ih<=ph){ pdf.addImage(img,'JPEG',0,0,iw,ih); }
      else {
        var s=ph/ih; pdf.addImage(img,'JPEG',(pw-iw*s)/2,0,iw*s,ph);
      }
    }
    var name=(fv('m1','hoten')||'HocSinh').trim().replace(/\s+/g,'_');
    pdf.save('HoSo_DinhHuong_HNA_'+name+'.pdf');
    toast('Đã xuất thành công file PDF!',true);
  }catch(e){ console.error(e); toast('Lỗi hệ thống xuất PDF — Vui lòng thử lại'); }
  $('#pdfArea').innerHTML='';
}
